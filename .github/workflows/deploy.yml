name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DO_SSH_HOST: ${{ secrets.DO_HOST }}
      DO_SSH_USERNAME: ${{ secrets.DO_USERNAME != '' && secrets.DO_USERNAME || 'root' }}
      DO_SSH_PORT: ${{ secrets.DO_PORT != '' && secrets.DO_PORT || '22' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Decrypt .env.prod.gpg
        run: |
          echo "${{ secrets.ENV_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 --decrypt .env.prod.gpg > .env.prod

      - name: Prepare SSH Key
        id: ssh_key
        run: |
          set -euo pipefail
          KEY_INPUT="${{ secrets.DO_SSH_KEY }}"

          # Support either a raw PEM key secret or a base64-encoded key secret.
          if printf '%s' "$KEY_INPUT" | grep -q "BEGIN .*PRIVATE KEY"; then
            KEY_CONTENT="$KEY_INPUT"
          else
            KEY_CONTENT="$(printf '%s' "$KEY_INPUT" | base64 --decode)"
          fi

          # Normalize potential CRLF line endings from copied secrets.
          KEY_FILE="$RUNNER_TEMP/do_deploy_key"
          printf '%s\n' "$KEY_CONTENT" | sed 's/\r$//' > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          # Fail early if the key is malformed.
          ssh-keygen -y -f "$KEY_FILE" > /dev/null
          echo "Loaded deploy key fingerprint:"
          ssh-keygen -lf "$KEY_FILE"

          {
            echo "key<<EOF"
            cat "$KEY_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Show SSH target
        run: |
          echo "SSH user: $DO_SSH_USERNAME"
          echo "SSH port: $DO_SSH_PORT"

      - name: Verify SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DO_SSH_HOST }}
          username: ${{ env.DO_SSH_USERNAME }}
          port: ${{ env.DO_SSH_PORT }}
          key: ${{ steps.ssh_key.outputs.key }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          script: |
            whoami
            hostname

      - name: Copy files via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DO_SSH_HOST }}
          username: ${{ env.DO_SSH_USERNAME }}
          port: ${{ env.DO_SSH_PORT }}
          key: ${{ steps.ssh_key.outputs.key }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          source: "./*,.env.prod"
          target: "/root/resume-optimizer-arab-backend"

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DO_SSH_HOST }}
          username: ${{ env.DO_SSH_USERNAME }}
          port: ${{ env.DO_SSH_PORT }}
          key: ${{ steps.ssh_key.outputs.key }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail

            # Small droplets can OOM during image builds; ensure swap exists.
            if [ ! -f /swapfile ]; then
              fallocate -l 1G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=1024
              chmod 600 /swapfile
              mkswap /swapfile
            fi
            swapon /swapfile || true

            cd /root/resume-optimizer-arab-backend

            docker compose -f docker-compose.prod.yml down
            docker builder prune -af || true
            docker image prune -af || true
            docker compose -f docker-compose.prod.yml build orchestrator-service
            docker compose -f docker-compose.prod.yml build parser-service
            docker compose -f docker-compose.prod.yml build gateway-service
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
