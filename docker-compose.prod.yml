services:
  # ==================================================================
  # DOMAIN MICROSERVICES
  # ==================================================================

  traefik:
    image: traefik:v3.1
    container_name: optimizer_traefik
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=admin@kgents.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    restart: always

  orchestrator-service:
    build:
      context: .
      dockerfile: services/orchestrator_service/Dockerfile
    container_name: optimizer_orchestrator
    env_file:
      - .env.prod
    ports:
      - "8001:8001"
    restart: always

  parser-service:
    build:
      context: .
      dockerfile: services/parser_service/Dockerfile
    container_name: optimizer_parser
    env_file:
      - .env.prod
    ports:
      - "8002:8002"
    restart: always

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway_service/Dockerfile
    container_name: optimizer_gateway
    env_file:
      - .env.prod
    environment:
      - ORCHESTRATOR_URL=http://orchestrator-service:8001
      - PARSER_URL=http://parser-service:8002
    labels:
      - traefik.enable=true
      - traefik.http.routers.resume-api-http.rule=Host(`arab-resumes.kgents.com`)
      - traefik.http.routers.resume-api-http.entrypoints=web
      - traefik.http.routers.resume-api-http.middlewares=resume-api-redirect
      - traefik.http.middlewares.resume-api-redirect.redirectscheme.scheme=https
      - traefik.http.routers.resume-api.rule=Host(`arab-resumes.kgents.com`)
      - traefik.http.routers.resume-api.entrypoints=websecure
      - traefik.http.routers.resume-api.tls=true
      - traefik.http.routers.resume-api.tls.certresolver=le
      - traefik.http.services.resume-api.loadbalancer.server.port=8000
    depends_on:
      orchestrator-service:
        condition: service_started
      parser-service:
        condition: service_started
    command: >
      uvicorn services.gateway_service.app.main:app
      --host 0.0.0.0
      --port 8000
    restart: always

  # ==================================================================
  # INFRASTRUCTURE
  # ==================================================================
  redis:
    image: redis:7-alpine
    container_name: optimizer_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

volumes:
  redis_data:
  traefik_letsencrypt:
